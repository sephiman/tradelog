# Generic
INTERNAL_ERROR=Error inesperado
VALIDATION_FAILED=La validación ha fallado
DATA_INTEGRITY_VIOLATION=Conflicto con datos existentes
INVALID_PARAMETER=Parámetro inválido: {0}
NOT_FOUND=No encontrado
FORBIDDEN=Acceso denegado
UNAUTHORIZED=Autenticación requerida
RATE_LIMITED=Demasiadas solicitudes, inténtalo de nuevo más tarde

# Validation
validation.required=Este campo es obligatorio
validation.invalid=Valor inválido
validation.too.long=El valor es demasiado largo
validation.email.invalid=Introduce un correo electrónico válido
validation.password.length=La contraseña debe tener al menos 8 caracteres

# Auth
INVALID_CREDENTIALS=Credenciales inválidas
EMAIL_ALREADY_REGISTERED=Ese correo ya está registrado
REGISTRATION_DISABLED=El registro está deshabilitado
PASSWORD_MISMATCH=La contraseña actual es incorrecta

# Profiles
PROFILE_NOT_FOUND=Perfil no encontrado
PROFILE_NAME_TAKEN=Ya tienes un perfil con ese nombre
NOT_PROFILE_OWNER=No tienes acceso a este perfil
# Positions & taxonomy
POSITION_NOT_FOUND=Posición no encontrada
TAG_NOT_FOUND=Etiqueta no encontrada
TAG_GROUP_NOT_FOUND=Grupo de etiquetas no encontrado
TAG_GROUP_MISMATCH=Esa etiqueta no pertenece al grupo indicado

# Data sources & connectors
DATA_SOURCE_NOT_FOUND=Fuente de datos no encontrada
DATA_SOURCE_CREDENTIALS_REQUIRED=Se requieren la clave y el secreto de API para esta fuente
DATA_SOURCE_NO_CREDENTIALS=Esta fuente de datos no tiene credenciales almacenadas
DATA_SOURCE_NOT_SYNCABLE=Esta fuente se actualiza subiendo un archivo, no mediante sincronización
DATA_SOURCE_CREDENTIALS_INVALID=El exchange rechazó las credenciales de API
DATA_SOURCE_PERMISSION_DENIED=La clave de API no tiene el permiso de lectura requerido (o tiene permisos de escritura/retirada)
CONNECTOR_NOT_AVAILABLE=No hay conector disponible para {0}
CONNECTOR_NOT_API=El conector {0} no es una fuente de API
CONNECTOR_NOT_FILE=El conector {0} no es una fuente de importación de archivo

# Sync & import
SYNC_RATE_LIMITED=La sincronización está limitada para este exchange, inténtalo en breve
SYNC_FAILED=La sincronización ha fallado
IMPORT_FAILED=La importación ha fallado
IMPORT_PARSE_FAILED=No se pudo procesar el archivo
IMPORT_NO_POSITIONS=No se encontraron posiciones cerradas en el archivo

# Credentials / crypto
CRYPTO_KEY_MISSING=La clave de cifrado no está configurada en el servidor
CRYPTO_KEY_INVALID=La clave de cifrado del servidor no es válida
CREDENTIALS_CORRUPT=Las credenciales almacenadas están corruptas y no se pueden leer
