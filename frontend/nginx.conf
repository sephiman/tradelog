# NOTE: security headers are repeated in any location that uses add_header itself —
# nginx drops inherited add_header directives the moment a block adds its own.
server {
    listen 80 default_server;
    # Also bind IPv6: in nginx:1.29-alpine the container's `localhost` resolves to ::1 first, and the
    # health check's wget fails with "connection refused" if nginx only listens on IPv4.
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/wasm;
    gzip_min_length 256;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    # Security headers for everything nginx serves (the backend sets its own on /api responses).
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy no-referrer always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    }

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff always;
    }

    location /api/ {
        # Use the unique container name (not the generic "backend" alias) so this never resolves to
        # another stack's backend sharing the same Docker network.
        proxy_pass http://tradelog-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 60s;
        # Must cover the backend's 15MB multipart limit (Quantfury PDF / journal CSV / backup
        # restore); nginx's 1MB default would 413 those uploads before they reach Spring.
        client_max_body_size 20m;
    }

    location / {
        try_files $uri /index.html;
    }
}
