server {
    listen 80 default_server;
    # Also bind IPv6: in nginx:1.29-alpine the container's `localhost` resolves to ::1 first, and the
    # health check's wget fails with "connection refused" if nginx only listens on IPv4.
    listen [::]:80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml application/wasm;
    gzip_min_length 256;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;

    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /api/ {
        # Use the unique container name (not the generic "backend" alias) so this never resolves to
        # another stack's backend sharing the same Docker network.
        proxy_pass http://tradelog-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location / {
        try_files $uri /index.html;
    }
}
